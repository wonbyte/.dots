"$schema" = "https://starship.rs/config-schema.json"

# Keep prompt responsive in big repos / remote filesystems
command_timeout = 800
scan_timeout = 500
add_newline = true

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "blue"
truncation_length = 4
truncate_to_repo = false
read_only = " "

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"
truncation_length = 32
truncation_symbol = "…"

[git_status]
format = '([\[$conflicted$untracked$modified$staged$renamed$deleted$stashed\]]($style) )([$ahead_behind]($style) )'
style = "cyan"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "≡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
min_time = 500
format = "[$duration]($style) "
style = "yellow"
